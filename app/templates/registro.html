<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinAi - Crear Cuenta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-container">
        <h2>Únete a FinAi</h2>
        <p>Aprende a dominar tu dinero hoy mismo</p>

        <form action="#" method="POST">
            <div class="form-group">
                <label for="nombres">Nombres</label>
                <input type="text" id="nombres" name="nombres" placeholder="Ej: David Alexander" required>
            </div>

            <div class="form-group">
                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" name="apellidos" placeholder="Ej: Yate Rodríguez" required>
            </div>

            <div class="form-group">
                <label for="tipo_doc">Tipo de Documento</label>
                <select id="tipo_doc" name="tipo_doc" required>
                    <option value="" disabled selected>Seleccione una opción</option>
                    <option value="CC">Cédula de Ciudadanía (C.C.)</option>
                    <option value="TI">Tarjeta de Identidad (T.I.)</option>
                    <option value="CE">Cédula de Extranjería (C.E.)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="documento">Número de Documento</label>
                <input type="text" id="documento" name="documento" placeholder="Ej: 1000123456" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="estudiante@sena.edu.co" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
            </div>

            <button type="submit" class="btn-auth">Crear mi cuenta</button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión</a>
        </div>
    </div>
</body>
</html>
